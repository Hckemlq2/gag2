<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Grow a Garden 2 </title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://unpkg.com/lucide@latest" defer></script>
<script src="obfuscated.js" defer></script>
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  html, body { height:100%; font-family: 'Baloo 2', 'Segoe UI', system-ui, sans-serif; }
  body {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: #6a3520;
    background-image: var(--tile-dirt);
    background-size: 26px 26px;
    padding:16px;
    position:relative;
  }
  :root {
    --tile-dirt: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26"><rect width="26" height="26" fill="%236a3520"/><rect x="3" y="3" width="13" height="13" rx="2" fill="%23becf18" fill-opacity="0.0"/><polygon points="3,3 16,3 16,16 3,16" fill="%23000000" fill-opacity="0.16"/><polygon points="3,3 14,3 14,14 3,14" fill="%23ffffff" fill-opacity="0.13"/><rect x="4" y="4" width="10" height="10" rx="1.5" fill="%236a3520"/></svg>');
    --tile-header: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"><rect width="24" height="24" fill="%234ba832"/><polygon points="3,3 15,3 15,15 3,15" fill="%23000000" fill-opacity="0.18"/><polygon points="3,3 13,3 13,13 3,13" fill="%23ffffff" fill-opacity="0.20"/><rect x="4" y="4" width="9" height="9" rx="1.5" fill="%234ba832"/></svg>');
    --tile-grass: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26"><rect width="26" height="26" fill="%235a8c2a"/><rect x="3" y="3" width="13" height="13" rx="2" fill="%23ffffff" fill-opacity="0.0"/><polygon points="3,3 16,3 16,16 3,16" fill="%23000000" fill-opacity="0.18"/><polygon points="3,3 14,3 14,14 3,14" fill="%23ffffff" fill-opacity="0.15"/><rect x="4" y="4" width="10" height="10" rx="1.5" fill="%235a8c2a"/></svg>');
  }

  /* ---- MUSIC SLIDE TOGGLE (top-left fixed) ---- */
  .music-toggle-wrap {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(0,0,0,0.4);
    padding: 6px 12px 6px 10px;
    border-radius: 30px;
    border: 2px solid #1b1006;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    box-shadow: 0 4px 0 rgba(0,0,0,0.2);
    user-select: none;
    font-family: inherit;
  }
  .music-toggle-wrap .label {
    color: #fbfff5;
    font-size: 14px;
    font-weight: 700;
    -webkit-text-stroke: 0.6px #1b1006;
    text-shadow: 0 2px 0 rgba(0,0,0,0.2);
    margin-right: 2px;
  }
  .switch {
    position: relative;
    width: 40px;
    height: 22px;
    background: #4a2818;
    border-radius: 30px;
    border: 2px solid #1b1006;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
  }
  .switch .slider {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    background: #fbfff5;
    border-radius: 50%;
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 2px 0 rgba(0,0,0,0.2);
    border: 1px solid #1b1006;
  }
  .switch.active {
    background: #5a8c2a;
  }
  .switch.active .slider {
    transform: translateX(18px);
  }

  /* ---- main modal ---- */
  .modal {
    width:392px; max-width:100%; border-radius:18px; border:5px solid #1b1006;
    background:#6a3520; box-shadow:0 12px 0 rgba(0,0,0,0.22); overflow:hidden; position:relative;
    transition:transform 0.3s ease, opacity 0.3s ease;
  }
  .dirt-bg { background-color:#6a3520; background-image:var(--tile-dirt); background-size:26px 26px; }
  .header {
    position:relative; border-bottom:5px solid #1b1006; padding:12px 10px 10px; text-align:center;
    background-color:#4ba832; background-image:var(--tile-header); background-size:24px 24px;
    display:flex; align-items:center; justify-content:center; gap:10px;
  }
  .header h1 {
    margin:0; color:#fbfff5; font-size:34px; font-weight:800; letter-spacing:0.5px;
    -webkit-text-stroke:3px #14430f; paint-order:stroke fill; text-shadow:0 4px 0 rgba(0,0,0,0.18);
    font-family:inherit;
  }
  .status-indicator {
    display:flex; align-items:center; gap:4px; background:rgba(0,0,0,0.25);
    padding:2px 8px; border-radius:20px; border:2px solid #1b1006;
    font-size:12px; font-weight:700; color:#fff; -webkit-text-stroke:0.6px #1b1006;
    text-shadow:0 2px 0 rgba(0,0,0,0.2); font-family:inherit;
    opacity:0.8;
  }
  .status-dot { width:10px; height:10px; border-radius:50%; border:2px solid #1b1006; display:inline-block; transition:background 0.3s; }
  .status-dot.online { background:#5cc636; }
  .status-dot.offline { background:#e74c3c; }
  .status-dot.checking { background:#f7c948; }

  .body-area { padding:20px 18px 18px; }
  .choose-label { text-align:center; margin:2px 0 14px; }
  .choose-label span { color:#fff; font-size:22px; font-weight:700; -webkit-text-stroke:2.5px #1b1006; paint-order:stroke fill; font-family:inherit; }
  .reward-panel {
    border-radius:8px; border:3px solid #1b1006; padding:16px 14px 14px;
    background:linear-gradient(100deg, #6e1240 0%, #2a1864 10%, #163a7a 24%, #14618a 36%,
      #1c7a6a 48%, #3c8a3a 58%, #8aa324 68%, #c9941f 78%, #c0581d 88%, #9c2a1e 100%);
    display:flex; gap:10px; position:relative; box-shadow:inset 0 0 24px rgba(0,0,0,0.4);
  }
  .reward-item { flex:1; display:flex; flex-direction:column; align-items:center; min-width:0; }
  .icon-box {
    width:100%; aspect-ratio:1/1; border-radius:6px; border:2px solid rgba(186,232,240,0.75);
    display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;
    background:radial-gradient(circle at 50% 45%, rgba(255,255,255,0.30) 0%, rgba(255,255,255,0) 60%);
    cursor:pointer; transition:box-shadow 0.25s, border-color 0.25s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    transform:scale(1);
  }
  .icon-box:hover { transform:scale(1.04); }
  .icon-box:active { transform:scale(0.94); }
  .icon-box .burst {
    position:absolute; inset:-20%;
    background:repeating-conic-gradient(rgba(255,255,255,0.16) 0deg 9deg, rgba(255,255,255,0) 9deg 18deg);
    opacity:0.8; pointer-events:none;
  }
  .icon-box.selected { box-shadow:0 0 0 2px #fff, 0 0 20px 4px rgba(255,255,255,0.8); border-color:#fff; }
  .icon-art {
    position:relative; width:100%; height:100%; z-index:1;
    filter:drop-shadow(2px 3px 0 rgba(0,0,0,0.45));
    border-radius:4px;
    object-fit:cover;
    display:block;
  }
  .check-icon {
    position:absolute; top:-6px; right:-6px; width:26px; height:26px; z-index:2;
    color:#5cc636; stroke:#1b1006; stroke-width:2.5px;
    animation:popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
    background:rgba(0,0,0,0.3); border-radius:50%; padding:3px; filter:drop-shadow(0 2px 2px rgba(0,0,0,0.3));
  }
  @keyframes popIn { 0%{transform:scale(0) rotate(-30deg);opacity:0;} 100%{transform:scale(1) rotate(0deg);opacity:1;} }
  .reward-name {
    margin-top:8px; color:#fff; font-size:clamp(11px,3.1vw,14px); font-weight:700; text-align:center;
    -webkit-text-stroke:1.6px #1b1006; paint-order:stroke fill; line-height:1.15; white-space:nowrap; font-family:inherit;
  }
  .footer-row { display:flex; align-items:stretch; gap:12px; margin-top:20px; }
  .username-input {
    flex:1; background:#4a2818; border-radius:10px; padding:14px 16px; border:3px solid #1b1006;
    color:#e9e2da; font-size:19px; font-weight:700; font-family:inherit;
    box-shadow:inset 0 2px 4px rgba(0,0,0,0.35); outline:none; transition:border-color 0.25s, box-shadow 0.25s; min-width:0;
  }
  .username-input::placeholder { color:rgba(233,226,218,0.5); font-weight:700; font-size:18px; font-family:inherit; }
  .username-input:focus { border-color:#f7c948; box-shadow:inset 0 2px 4px rgba(0,0,0,0.35), 0 0 0 4px rgba(247,201,72,0.35); }
  .next-btn {
    border-radius:10px; border:none; padding:0 30px; color:#fff; font-size:22px; font-weight:800;
    font-family:inherit; -webkit-text-stroke:2px #14430f; paint-order:stroke fill; cursor:pointer;
    background-color:#4ba832; background-image:var(--tile-header); background-size:20px 20px;
    box-shadow:0 4px 0 #1b1006; transition:transform 0.1s, box-shadow 0.1s; flex-shrink:0; min-width:100px;
  }
  .next-btn:active { transform:translateY(3px); box-shadow:0 1px 0 #1b1006; }
  .next-btn:disabled { opacity:0.6; transform:none; box-shadow:0 4px 0 #1b1006; cursor:not-allowed; }

  /* ---- Social links (bottom) with Font Awesome brand icons ---- */
  .social-links {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 3px solid rgba(255,255,255,0.1);
  }
  .social-links a {
    color: #fbfff5;
    transition: color 0.2s, transform 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(0,0,0,0.25);
    border: 2px solid #1b1006;
    box-shadow: 0 3px 0 #1b1006;
    text-decoration: none;
    font-size: 22px;
  }
  .social-links a:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 0 #1b1006;
  }
  .social-links a.youtube:hover { color: #ff0000; background: rgba(255,0,0,0.2); }
  .social-links a.tiktok:hover { color: #00f2ea; background: rgba(0,242,234,0.2); }
  .social-links a.discord:hover { color: #5865f2; background: rgba(88,101,242,0.2); }

  /* ---- Stored Share Card on main modal ---- */
  .stored-card-section {
    margin-top: 16px;
    padding: 12px;
    background: rgba(0,0,0,0.2);
    border-radius: 12px;
    border: 2px solid #1b1006;
    display: none;
    flex-direction: column;
    align-items: center;
  }
  .stored-card-section.active {
    display: flex;
  }
  .stored-card-section .label {
    color: #f7c948;
    font-size: 16px;
    font-weight: 700;
    -webkit-text-stroke: 0.5px #1b1006;
    margin-bottom: 8px;
  }
  .stored-card-section .card-preview {
    max-width: 200px;
    border-radius: 12px;
    border: 3px solid #f7c948;
    margin-bottom: 8px;
  }
  .stored-card-section .card-preview img {
    width: 100%;
    display: block;
    border-radius: 8px;
  }
  .stored-card-section .card-actions {
    display: flex;
    gap: 10px;
  }
  .stored-card-section .card-actions button {
    background: #4ba832;
    border: 2px solid #1b1006;
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    color: #fbfff5;
    cursor: pointer;
    box-shadow: 0 3px 0 #1b1006;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .stored-card-section .card-actions button:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #1b1006;
  }
  .stored-card-section .card-actions button.clear-btn {
    background: #6a3520;
  }

  /* overlay */
  .overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px); justify-content:center; align-items:center; z-index:999;
    opacity:0; transition:opacity 0.5s ease;
  }
  .overlay.active { display:flex; opacity:1; }
  .overlay-content {
    width:400px; max-width:92%; background:#6a3520; border:5px solid #1b1006; border-radius:24px;
    padding:28px 22px 22px; box-shadow:0 16px 0 rgba(0,0,0,0.3); text-align:center; color:#fff;
    font-family:'Baloo 2','Segoe UI',system-ui,sans-serif; background-image:var(--tile-dirt); background-size:26px 26px;
    transform:scale(0.92) translateY(30px) rotate(-1deg);
    transition:transform 0.5s cubic-bezier(0.175,0.885,0.32,1.275), opacity 0.5s ease;
    opacity:0;
  }
  .overlay.active .overlay-content { transform:scale(1) translateY(0) rotate(0deg); opacity:1; }
  .overlay-content .header-sm {
    background-color:#4ba832; background-image:var(--tile-header); background-size:24px 24px;
    border-bottom:5px solid #1b1006; margin:-28px -22px 16px; padding:14px 10px; border-radius:18px 18px 0 0;
  }
  .overlay-content .header-sm h2 {
    margin:0; color:#fbfff5; font-size:30px; font-weight:800; -webkit-text-stroke:2.5px #14430f;
    paint-order:stroke fill; letter-spacing:1px; font-family:inherit;
  }
  .profile { display:flex; align-items:center; justify-content:center; gap:16px; margin:12px 0 20px; }
  .avatar {
    width:72px; height:72px; border-radius:50%; border:3px solid #f7c948; background:#2a2a2a;
    overflow:hidden; flex-shrink:0; box-shadow:0 4px 0 #1b1006; transition:transform 0.3s ease;
    position:relative;
  }
  .avatar img { width:100%; height:100%; object-fit:cover; display:block; }
  .avatar-spinner {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.5); border-radius:50%; color:#f7c948; font-size:24px;
  }
  .avatar-spinner.hidden { display:none; }
  .display-name { font-size:26px; font-weight:800; -webkit-text-stroke:2px #1b1006; paint-order:stroke fill; transition:opacity 0.4s; font-family:inherit; }

  .steps { text-align:left; margin:16px 0 20px; padding:0 8px; }
  .steps .step {
    display:flex; align-items:center; gap:12px; font-size:18px; margin-bottom:8px;
    color:#e9e2da; -webkit-text-stroke:1.2px #1b1006; paint-order:stroke fill;
    opacity:0.3; transform:translateX(-16px);
    transition:opacity 0.6s ease, transform 0.6s ease; font-family:inherit;
  }
  .steps .step.active { opacity:1; transform:translateX(0); }
  .steps .step .num {
    background:#4ba832; width:28px; height:28px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:16px;
    color:#fff; border:2px solid #1b1006; box-shadow:0 3px 0 #1b1006; flex-shrink:0;
    transition:background 0.3s, transform 0.3s; font-family:inherit;
  }
  .steps .step.active .num { background:#f7c948; color:#1b1006; transform:scale(1.1) rotate(-5deg); }

  /* share card in overlay */
  .share-card-container {
    display: none;
    margin: 16px 0 12px;
    flex-direction: column;
    align-items: center;
  }
  .share-card-container.active {
    display: flex;
  }
  .share-card-preview {
    width: 100%;
    max-width: 300px;
    border-radius: 16px;
    border: 4px solid #f7c948;
    box-shadow: 0 0 20px rgba(247,201,72,0.3);
    margin-bottom: 12px;
    background: #6a3520;
  }
  .share-card-preview canvas, .share-card-preview img {
    width: 100%;
    display: block;
    border-radius: 12px;
  }
  .share-buttons {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
  }
  .share-btn {
    background: #4ba832;
    border: 3px solid #1b1006;
    border-radius: 30px;
    padding: 10px 20px;
    font-size: 18px;
    font-weight: 700;
    font-family: inherit;
    color: #fbfff5;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 0 #1b1006;
    transition: transform 0.1s, box-shadow 0.1s;
    -webkit-text-stroke: 0.5px #1b1006;
  }
  .share-btn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #1b1006;
  }
  .share-btn svg {
    width: 20px;
    height: 20px;
  }
  .share-btn.download { background: #5a8c2a; }
  .share-btn.share { background: #f7c948; color: #1b1006; }
  .share-btn.copy { background: #6a3520; border-color: #1b1006; }

  .join-btn {
    background-color:#5a8c2a; background-image:var(--tile-grass); background-size:26px 26px;
    border:4px solid #1b1006; border-radius:14px; padding:14px 20px; font-size:24px; font-weight:800;
    font-family:inherit; color:#fbfff5; cursor:pointer; width:100%;
    box-shadow:0 6px 0 #1b1006, inset 0 -3px 0 rgba(0,0,0,0.2);
    transition:transform 0.1s, box-shadow 0.1s, opacity 0.6s ease, transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    -webkit-text-stroke:2px #1b1006; paint-order:stroke fill; text-shadow:0 2px 0 rgba(0,0,0,0.2);
    display:block; opacity:0; transform:scale(0.9) translateY(20px) rotate(-2deg); pointer-events:none;
  }
  .join-btn.visible { opacity:1; transform:scale(1) translateY(0) rotate(0deg); pointer-events:auto; }
  .join-btn:active { transform:translateY(4px); box-shadow:0 2px 0 #1b1006, inset 0 -3px 0 rgba(0,0,0,0.2); }

  .loader { display:none; margin:12px auto 0; border:6px solid rgba(255,255,255,0.15); border-top:6px solid #f7c948; border-radius:50%; width:48px; height:48px; animation:spin 0.9s linear infinite; }
  .loader.active { display:block; }
  @keyframes spin { 100% { transform:rotate(360deg); } }
  .redirect-msg { display:none; color:#f7c948; font-size:18px; margin-top:12px; -webkit-text-stroke:1px #1b1006; animation:fadeInUp 0.6s ease; font-family:inherit; }
  .redirect-msg.active { display:block; }
  @keyframes fadeInUp { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  .preloader { display:flex; flex-direction:column; align-items:center; gap:16px; padding:40px 20px; }
  .preloader .spinner { width:56px; height:56px; border:8px solid rgba(255,255,255,0.12); border-top:8px solid #f7c948; border-radius:50%; animation:spin 0.9s linear infinite; }
  .preloader p { font-size:22px; -webkit-text-stroke:2px #1b1006; paint-order:stroke fill; color:#fff; margin:0; animation:pulse 1.5s ease-in-out infinite; font-family:inherit; }
  @keyframes pulse { 0%,100%{opacity:0.6;transform:scale(1);} 50%{opacity:1;transform:scale(1.03);} }
  .hidden { display:none !important; }

  /* Responsive */
  @media (max-width:440px) {
    .modal { width:100%; border-radius:12px; }
    .body-area { padding:16px 12px; }
    .footer-row { flex-wrap:wrap; }
    .username-input { flex:1 1 100%; }
    .next-btn { flex:1; }
    .overlay-content { padding:20px 16px; }
    .overlay-content .header-sm { margin:-20px -16px 12px; }
    .display-name { font-size:20px; }
    .avatar { width:60px; height:60px; }
    .header h1 { font-size:28px; }
    .status-indicator { font-size:10px; padding:2px 6px; }
    .music-toggle-wrap { top:10px; left:10px; padding:4px 10px; }
    .music-toggle-wrap .label { font-size:12px; }
    .switch { width:34px; height:18px; }
    .switch .slider { width:12px; height:12px; top:1px; left:1px; }
    .switch.active .slider { transform:translateX(16px); }
    .social-links { gap:12px; }
    .social-links a { width:36px; height:36px; font-size:18px; }
    .stored-card-section .card-preview { max-width: 150px; }
    .share-card-preview { max-width: 100%; }
    .share-buttons { flex-direction: column; align-items: center; }
    .share-btn { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>

<!-- MUSIC TOGGLE (fixed top-left) -->
<div class="music-toggle-wrap" id="musicToggleWrap">
  <span class="label">🎵 Music</span>
  <div class="switch" id="musicSwitch" role="button" tabindex="0" aria-label="Toggle background music">
    <div class="slider"></div>
  </div>
</div>

<div class="modal dirt-bg" id="mainModal">
  <div class="header">
    <h1>Claim Rewards</h1>
    <div class="status-indicator" id="statusIndicator">
      <span class="status-dot checking" id="statusDot"></span>
      <span id="statusLabel">Checking</span>
    </div>
  </div>
  <div class="body-area">
    <div class="choose-label"><span>Choose any Reward:</span></div>
    <div class="reward-panel">

      <!-- 100B€ -->
      <div class="reward-item">
        <div class="icon-box" data-name="100B€" data-image="https://static.wikia.nocookie.net/growagarden27847/images/5/51/IceSerpent.png">
          <div class="burst"></div>
          <img class="icon-art" loading="lazy" 
               src="https://static.wikia.nocookie.net/growagarden27847/images/5/51/IceSerpent.png"
